<head>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', sans-serif; background: #09090b; color: #e4e4e7; }

  .app { max-width: 1300px; margin: 0 auto; padding: 32px 20px 80px; }
  h1 { font-size: 24px; font-weight: 700; text-align: center; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #71717a; text-align: center; margin-bottom: 32px; }

  /* Tabs */
  .tabs { display: flex; justify-content: center; gap: 4px; margin-bottom: 32px; background: #18181b; border-radius: 10px; padding: 3px; width: fit-content; margin-left: auto; margin-right: auto; }
  .tab { padding: 9px 18px; border-radius: 7px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; background: none; color: #71717a; transition: all 0.2s; }
  .tab.active { background: #27272a; color: #e4e4e7; }

  /* Site header */
  .site-header { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid #27272a; }
  .site-dot { width: 12px; height: 12px; border-radius: 50%; }
  .site-name { font-size: 18px; font-weight: 700; }
  .site-type { font-size: 12px; color: #71717a; background: #18181b; padding: 3px 8px; border-radius: 4px; }

  /* Stats row */
  .stats { display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
  .stat { background: #18181b; border: 1px solid #27272a; border-radius: 10px; padding: 14px 18px; flex: 1; min-width: 120px; }
  .stat-value { font-size: 22px; font-weight: 700; }
  .stat-label { font-size: 11px; color: #71717a; margin-top: 2px; }
  .stat-good .stat-value { color: #34d399; }
  .stat-bad .stat-value { color: #f87171; }
  .stat-neutral .stat-value { color: #fbbf24; }

  /* Flow diagram */
  .flow-container { margin-bottom: 32px; }
  .flow-title { font-size: 14px; font-weight: 600; margin-bottom: 12px; color: #a1a1aa; }

  .flow { display: flex; flex-direction: column; gap: 0; }
  .flow-step { display: flex; align-items: stretch; }
  .flow-line { width: 40px; display: flex; flex-direction: column; align-items: center; flex-shrink: 0; }
  .flow-dot { width: 10px; height: 10px; border-radius: 50%; border: 2px solid; flex-shrink: 0; }
  .flow-connector { width: 2px; flex: 1; min-height: 8px; }
  .flow-content { flex: 1; padding: 8px 0 8px 12px; }
  .flow-card { background: #18181b; border: 1px solid #27272a; border-radius: 10px; padding: 14px 16px; }
  .flow-card-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
  .flow-card-desc { font-size: 12px; color: #71717a; line-height: 1.5; }
  .flow-card-ctas { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .flow-cta { font-size: 11px; padding: 3px 8px; border-radius: 5px; font-weight: 500; }
  .flow-cta.primary { background: rgba(52,211,153,0.15); color: #34d399; border: 1px solid rgba(52,211,153,0.2); }
  .flow-cta.secondary { background: rgba(251,191,36,0.1); color: #fbbf24; border: 1px solid rgba(251,191,36,0.15); }
  .flow-cta.explore { background: rgba(96,165,250,0.1); color: #60a5fa; border: 1px solid rgba(96,165,250,0.15); }
  .flow-cta.dead { background: rgba(248,113,113,0.1); color: #f87171; border: 1px solid rgba(248,113,113,0.15); }

  /* Pros/Cons */
  .analysis { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 24px; }
  .analysis-card { border-radius: 10px; padding: 16px; }
  .analysis-card.pros { background: rgba(52,211,153,0.04); border: 1px solid rgba(52,211,153,0.12); }
  .analysis-card.cons { background: rgba(248,113,113,0.04); border: 1px solid rgba(248,113,113,0.12); }
  .analysis-card h3 { font-size: 13px; font-weight: 600; margin-bottom: 10px; }
  .analysis-card.pros h3 { color: #34d399; }
  .analysis-card.cons h3 { color: #f87171; }
  .analysis-card li { font-size: 12px; color: #a1a1aa; margin-bottom: 6px; line-height: 1.5; list-style: none; }
  .analysis-card li::before { content: '→ '; }

  /* Compare view */
  .compare-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-top: 24px; }
  .compare-col { background: #18181b; border: 1px solid #27272a; border-radius: 10px; padding: 16px; }
  .compare-col h3 { font-size: 14px; font-weight: 600; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid #27272a; }
  .compare-row { display: flex; justify-content: space-between; font-size: 12px; padding: 6px 0; border-bottom: 1px solid #18181b; }
  .compare-row .label { color: #71717a; }
  .compare-row .value { font-weight: 500; }
  .compare-row .good { color: #34d399; }
  .compare-row .bad { color: #f87171; }
  .compare-row .mid { color: #fbbf24; }

  /* Convergence */
  .convergence { margin-top: 24px; background: #18181b; border: 1px solid #27272a; border-radius: 10px; padding: 20px; }
  .convergence h3 { font-size: 14px; font-weight: 600; margin-bottom: 12px; }
  .convergence-map { font-size: 12px; color: #a1a1aa; line-height: 2; font-family: 'SF Mono', 'Fira Code', monospace; white-space: pre; overflow-x: auto; }

  @media (max-width: 768px) {
    .analysis { grid-template-columns: 1fr; }
    .compare-grid { grid-template-columns: 1fr; }
    .stats { flex-direction: column; }
  }
</style>

function show(key) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');

  if (key === 'compare') { showCompare(); return; }

  const s = SITES[key];
  const v = document.getElementById('view');

  let statsHtml = s.stats.map(st => `<div class="stat stat-${st.cls}"><div class="stat-value">${st.value}</div><div class="stat-label">${st.label}</div></div>`).join('');

  let flowHtml = s.flow.map((step, i) => {
    const isLast = i === s.flow.length - 1;
    const ctasHtml = step.ctas.map(c => `<span class="flow-cta ${c.type}">${c.text}</span>`).join('');
    return `
      <div class="flow-step">
        <div class="flow-line">
          <div class="flow-dot" style="border-color:${step.color}; ${step.color === '#34d399' ? 'background:#34d399' : ''}"></div>
          ${!isLast ? `<div class="flow-connector" style="background:${s.flow[i+1]?.color || '#27272a'}30"></div>` : ''}
        </div>
        <div class="flow-content">
          <div class="flow-card">
            <div class="flow-card-title">${step.title}</div>
            <div class="flow-card-desc">${step.desc}</div>
            ${ctasHtml ? `<div class="flow-card-ctas">${ctasHtml}</div>` : ''}
          </div>
        </div>
      </div>`;
  }).join('');

  let prosHtml = s.pros.map(p => `<li>${p}</li>`).join('');
  let consHtml = s.cons.map(c => `<li>${c}</li>`).join('');

  v.innerHTML = `
    <div class="site-header">
      <div class="site-dot" style="background:${s.color}"></div>
      <div class="site-name">${s.name}</div>
      <div class="site-type">${s.type}</div>
    </div>
    <div class="stats">${statsHtml}</div>
    <div class="flow-container">
      <div class="flow-title">PARCOURS UTILISATEUR</div>
      <div class="flow">${flowHtml}</div>
    </div>
    <div class="convergence">
      <h3>Convergence des pages</h3>
      <div class="convergence-map">${s.convergence}</div>
    </div>
    <div class="analysis">
      <div class="analysis-card pros"><h3>✅ Forces</h3><ul>${prosHtml}</ul></div>
      <div class="analysis-card cons"><h3>❌ Faiblesses</h3><ul>${consHtml}</ul></div>
    </div>`;
}
